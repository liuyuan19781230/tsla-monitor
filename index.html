<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TSLA预测">
<meta name="theme-color" content="#04070a">
<title>TSLA · 走势预测</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap');
:root{
  --bg:#04070a;--card:#0c1219;--card2:#111a24;--border:#1a2a38;
  --red:#e31937;--green:#16c784;--yellow:#f5a623;--blue:#4da6ff;
  --text:#ccd9e6;--muted:#3a5268;
  --sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg)}
body{
  font-family:'Space Grotesk',sans-serif;color:var(--text);
  padding:calc(var(--sat)+10px) 12px calc(var(--sab)+10px);
  min-height:100vh;font-size:14px;
  background-image:radial-gradient(ellipse at 0 0,rgba(227,25,55,.06) 0%,transparent 45%);
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes shimmer{0%,100%{opacity:.4}50%{opacity:.85}}

/* HEADER */
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.brand-logo{font-family:'Space Mono',monospace;font-size:24px;font-weight:700;color:var(--red);letter-spacing:2px;line-height:1}
.brand-sub{font-size:13px;color:var(--muted);margin-top:3px}
.pill{display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:6px 12px;font-size:12px;color:var(--muted);font-family:'Space Mono',monospace}
.led{width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0}
.led.ok{background:var(--green);box-shadow:0 0 5px var(--green);animation:blink 2s infinite}
.led.spin{background:var(--yellow);animation:blink .3s infinite}
.led.err{background:var(--red)}

/* ERR / MANUAL */
.err-box{display:none;background:rgba(227,25,55,.07);border:1px solid rgba(227,25,55,.25);border-radius:10px;padding:10px 14px;font-size:13px;color:#f87171;margin-bottom:8px}
.manual-row{display:none;gap:8px;margin-bottom:8px}
.manual-row input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:9px;color:var(--text);padding:10px 14px;font-family:'Space Mono',monospace;font-size:15px;outline:none}
.manual-row input:focus{border-color:var(--red)}
.manual-row input::placeholder{color:var(--muted);font-size:13px}

/* PRICE CARD */
.price-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px;position:relative;overflow:hidden}
.price-card::after{content:'TSLA';position:absolute;right:-4px;top:50%;transform:translateY(-50%);font-family:'Space Mono',monospace;font-size:56px;font-weight:700;color:rgba(227,25,55,.04);letter-spacing:4px;pointer-events:none}
.price-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.price-lbl{font-size:12px;color:var(--muted);letter-spacing:2px;margin-bottom:4px;font-family:'Space Mono',monospace}
.price-num{font-family:'Space Mono',monospace;font-size:40px;font-weight:700;line-height:1;color:var(--text);transition:color .3s;letter-spacing:0}
.price-num.up{color:var(--green)}.price-num.dn{color:var(--red)}
.price-right{text-align:right}
.price-chg{font-family:'Space Mono',monospace;font-size:16px;font-weight:700;margin-bottom:4px}
.price-chg.up{color:var(--green)}.price-chg.dn{color:var(--red)}
.price-ts{font-size:12px;color:var(--muted)}
.mkt-badge{display:inline-block;font-size:12px;padding:3px 9px;border-radius:5px;margin-top:4px;font-family:'Space Mono',monospace;letter-spacing:.5px}
.mkt-badge.open{background:rgba(22,199,132,.1);color:var(--green);border:1px solid rgba(22,199,132,.2)}
.mkt-badge.closed{background:rgba(58,82,104,.15);color:var(--muted);border:1px solid var(--border)}
.mkt-badge.pre{background:rgba(245,166,35,.08);color:var(--yellow);border:1px solid rgba(245,166,35,.2)}
.oc-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding-top:13px;border-top:1px solid var(--border)}
.oc-lbl{font-size:12px;color:var(--muted);letter-spacing:1.5px;margin-bottom:4px;font-family:'Space Mono',monospace}
.oc-val{font-family:'Space Mono',monospace;font-size:19px;font-weight:700;color:var(--text)}
.oc-val.up{color:var(--green)}.oc-val.dn{color:var(--red)}.oc-val.dim{color:var(--muted);font-size:14px}
.oc-sub{font-size:12px;color:var(--muted);margin-top:3px}

/* DAY PRED */
.day-pred{border-radius:14px;padding:15px;margin-bottom:10px;border:1px solid var(--border);background:var(--card);position:relative;overflow:hidden;transition:border-color .4s,background .4s}
.day-pred.bullish{border-color:rgba(22,199,132,.35);background:linear-gradient(145deg,#071510 0%,var(--card) 55%)}
.day-pred.bearish{border-color:rgba(227,25,55,.35);background:linear-gradient(145deg,#150508 0%,var(--card) 55%)}
.day-pred::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;transition:background .4s}
.day-pred.bullish::before{background:linear-gradient(90deg,var(--green),transparent)}
.day-pred.bearish::before{background:linear-gradient(90deg,var(--red),transparent)}
.sec-lbl{font-size:12px;color:var(--muted);letter-spacing:2px;font-family:'Space Mono',monospace;margin-bottom:10px;text-transform:uppercase}
.pred-main{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.pred-dir{font-family:'Space Mono',monospace;font-size:34px;font-weight:700;line-height:1;display:flex;align-items:center;gap:8px}
.pred-dir.up{color:var(--green)}.pred-dir.dn{color:var(--red)}
.pred-r{text-align:right}
.conf-lbl{font-size:12px;color:var(--muted);letter-spacing:1.5px;margin-bottom:3px;font-family:'Space Mono',monospace}
.conf-num{font-family:'Space Mono',monospace;font-size:30px;font-weight:700}
.conf-num.up{color:var(--green)}.conf-num.dn{color:var(--red)}
.bars{display:flex;gap:10px;margin-bottom:10px}
.bar-w{flex:1}
.bar-n{font-size:12px;color:var(--muted);margin-bottom:4px}
.bar-t{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.bar-f{height:100%;border-radius:3px;transition:width .8s}
.bar-f.up{background:var(--green)}.bar-f.dn{background:var(--red)}
.bar-p{font-size:13px;font-weight:600;margin-top:3px}
.bar-p.up{color:var(--green)}.bar-p.dn{color:var(--red)}
.signals{display:flex;flex-wrap:wrap;gap:6px;padding-top:10px;border-top:1px solid var(--border)}
.sig-tag{font-size:12px;padding:4px 9px;border-radius:5px;font-family:'Space Mono',monospace}
.sig-tag.bull{background:rgba(22,199,132,.1);color:var(--green);border:1px solid rgba(22,199,132,.15)}
.sig-tag.bear{background:rgba(227,25,55,.1);color:var(--red);border:1px solid rgba(227,25,55,.15)}
.sig-tag.neutral{background:rgba(77,166,255,.07);color:var(--blue);border:1px solid rgba(77,166,255,.12)}

/* RANGE CARD */
.range-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:15px;margin-bottom:10px}
.range-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.range-side{text-align:center;flex:1}
.range-side-lbl{font-size:12px;color:var(--muted);letter-spacing:1.5px;font-family:'Space Mono',monospace;margin-bottom:6px}
.range-price{font-family:'Space Mono',monospace;font-size:28px;font-weight:700;line-height:1}
.range-price.lo{color:var(--red)}.range-price.hi{color:var(--green)}
.range-pct{font-size:13px;margin-top:5px;font-family:'Space Mono',monospace}
.range-pct.lo{color:var(--red)}.range-pct.hi{color:var(--green)}
.range-mid{text-align:center;padding:0 8px;flex-shrink:0}
.range-arrow{font-size:20px;color:var(--muted);margin-bottom:4px}
.range-cur-lbl{font-size:12px;color:var(--muted);font-family:'Space Mono',monospace}
.range-cur-val{font-family:'Space Mono',monospace;font-size:15px;font-weight:700;color:var(--yellow);margin-top:3px}
/* bar */
.range-bar-wrap{margin-bottom:12px}
.range-track{height:10px;background:var(--border);border-radius:5px;position:relative}
.range-fill{position:absolute;top:0;left:0;right:0;height:100%;border-radius:5px;background:linear-gradient(90deg,var(--red),rgba(245,166,35,.5),var(--green))}
.range-dot{position:absolute;top:50%;transform:translate(-50%,-50%);width:16px;height:16px;border-radius:50%;background:#fff;border:2px solid var(--yellow);box-shadow:0 0 8px rgba(245,166,35,.6);transition:left .6s;z-index:2}
.range-bar-lbls{display:flex;justify-content:space-between;margin-top:6px;font-size:12px;color:var(--muted);font-family:'Space Mono',monospace}
/* stats */
.range-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding-top:12px;border-top:1px solid var(--border)}
.rs-cell{text-align:center;background:var(--card2);border-radius:9px;padding:10px 4px}
.rs-lbl{font-size:12px;color:var(--muted);font-family:'Space Mono',monospace;margin-bottom:6px}
.rs-val{font-family:'Space Mono',monospace;font-size:18px;font-weight:700}
.rs-val.up{color:var(--green)}.rs-val.dn{color:var(--red)}.rs-val.neutral{color:var(--blue)}

/* HOUR */
.hour-section{margin-bottom:10px}
.sec-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.sec-hdr-lbl{font-size:12px;color:var(--muted);letter-spacing:2px;font-family:'Space Mono',monospace;white-space:nowrap}
.sec-hdr-line{flex:1;height:1px;background:var(--border)}
.hour-list{display:flex;flex-direction:column;gap:7px}
.hslot{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:12px 14px;display:grid;grid-template-columns:92px 1fr auto auto;align-items:center;gap:8px;transition:border-color .3s}
.hslot.active{border-color:rgba(245,166,35,.45);background:rgba(245,166,35,.03)}
.hslot.hit-up{border-color:rgba(22,199,132,.25)}.hslot.hit-dn{border-color:rgba(227,25,55,.25)}
.hs-time{font-family:'Space Mono',monospace;font-size:12px;font-weight:700;color:var(--muted)}
.hs-time.active{color:var(--yellow)}
.hs-pred{font-family:'Space Mono',monospace;font-size:14px;font-weight:700}
.hs-pred.up{color:var(--green)}.hs-pred.dn{color:var(--red)}.hs-pred.wait{color:var(--muted);font-size:12px;animation:shimmer 2s infinite}
.hs-conf{font-size:12px;color:var(--muted);text-align:right;font-family:'Space Mono',monospace}
.hs-result{font-size:12px;font-weight:700;text-align:right;min-width:48px;font-family:'Space Mono',monospace}
.hs-result.up{color:var(--green)}.hs-result.dn{color:var(--red)}.hs-result.live{color:var(--yellow)}.hs-result.wait{color:var(--muted)}

/* METRICS */
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.met{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:13px 14px}
.met-lbl{font-size:12px;color:var(--muted);letter-spacing:1.5px;margin-bottom:6px;font-family:'Space Mono',monospace}
.met-val{font-family:'Space Mono',monospace;font-size:20px;font-weight:700;line-height:1}
.met-val.up{color:var(--green)}.met-val.dn{color:var(--red)}.met-val.neutral{color:var(--blue)}
.met-sub{font-size:12px;color:var(--muted);margin-top:5px}

/* LOG */
.log{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:12px 14px;margin-bottom:10px;max-height:140px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.log-hdr{font-size:12px;color:var(--muted);letter-spacing:2px;font-family:'Space Mono',monospace;margin-bottom:8px}
.log-row{display:flex;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;font-family:'Space Mono',monospace;align-items:center}
.log-row:last-child{border-bottom:none}
.lr-t{color:var(--muted);min-width:54px}.lr-p{color:var(--yellow);min-width:62px}.lr-c{font-weight:700;flex:1}.lr-v{color:var(--muted);font-size:12px}

/* FOOTER */
.footer{display:flex;gap:8px;align-items:center;margin-bottom:6px}
.btn{flex:1;background:transparent;border:1px solid var(--red);color:var(--red);padding:12px;border-radius:10px;font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600;letter-spacing:1px;cursor:pointer;transition:all .2s}
.btn:active{background:var(--red);color:#fff;transform:scale(.97)}
.cd-txt{font-size:12px;color:var(--muted);font-family:'Space Mono',monospace;min-width:72px;text-align:right}
.disc{text-align:center;font-size:12px;color:var(--muted);padding-bottom:2px}
.up{color:var(--green)}.dn{color:var(--red)}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <div class="brand-logo">TSLA</div>
    <div class="brand-sub">走势预测 · 日线 + 小时</div>
  </div>
  <div class="pill">
    <div class="led" id="led"></div>
    <span id="statusTxt">连接中</span>
  </div>
</div>

<div class="err-box" id="errBox"></div>
<div class="manual-row" id="manualRow">
  <input type="number" id="manualInput" placeholder="输入当前TSLA价格 如 376.30" inputmode="decimal" step="0.01"/>
  <button class="btn" style="flex:0;padding:9px 14px;white-space:nowrap" onclick="submitManual()">确认</button>
</div>

<!-- 价格卡片 -->
<div class="price-card">
  <div class="price-top">
    <div>
      <div class="price-lbl">NASDAQ · TSLA</div>
      <div class="price-num" id="priceNum">---.--</div>
    </div>
    <div class="price-right">
      <div class="price-chg" id="priceChg">--</div>
      <div class="price-ts" id="priceTs">--</div>
      <div class="mkt-badge closed" id="mktBadge">-- 市场</div>
    </div>
  </div>
  <div class="oc-row">
    <div>
      <div class="oc-lbl">开盘价格</div>
      <div class="oc-val" id="openVal">--</div>
      <div class="oc-sub">今日开盘</div>
    </div>
    <div>
      <div class="oc-lbl">收盘价格</div>
      <div class="oc-val dim" id="closeVal">等待收盘</div>
      <div class="oc-sub" id="closeSub">16:00 EST 更新</div>
    </div>
  </div>
</div>

<!-- 全天预测 -->
<div class="day-pred" id="dayPred">
  <div class="sec-lbl">当日走势预测（全天）</div>
  <div class="pred-main">
    <div class="pred-dir up" id="dayDir">分析中</div>
    <div class="pred-r">
      <div class="conf-lbl">置信度</div>
      <div class="conf-num up" id="dayConf">--%</div>
    </div>
  </div>
  <div class="bars">
    <div class="bar-w">
      <div class="bar-n">看涨</div>
      <div class="bar-t"><div class="bar-f up" id="upBar" style="width:50%"></div></div>
      <div class="bar-p up" id="upPct">50%</div>
    </div>
    <div class="bar-w">
      <div class="bar-n">看跌</div>
      <div class="bar-t"><div class="bar-f dn" id="dnBar" style="width:50%"></div></div>
      <div class="bar-p dn" id="dnPct">50%</div>
    </div>
  </div>
  <div class="signals" id="sigTags"></div>
</div>

<!-- 价格区间 -->
<div class="range-card">
  <div class="sec-lbl">当日预测价格区间</div>
  <div class="range-top">
    <div class="range-side">
      <div class="range-side-lbl">预测低点</div>
      <div class="range-price lo" id="rangeLow">---</div>
      <div class="range-pct lo" id="rangeLowPct">--</div>
    </div>
    <div class="range-mid">
      <div class="range-arrow">↔</div>
      <div class="range-cur-lbl">当前价</div>
      <div class="range-cur-val" id="rangeCur">---</div>
    </div>
    <div class="range-side">
      <div class="range-side-lbl">预测高点</div>
      <div class="range-price hi" id="rangeHigh">---</div>
      <div class="range-pct hi" id="rangeHighPct">--</div>
    </div>
  </div>
  <div class="range-bar-wrap">
    <div class="range-track">
      <div class="range-fill"></div>
      <div class="range-dot" id="rangeDot" style="left:50%"></div>
    </div>
    <div class="range-bar-lbls">
      <span id="rangeLowLbl">--</span>
      <span style="color:var(--yellow)">● 当前</span>
      <span id="rangeHighLbl">--</span>
    </div>
  </div>
  <div class="range-stats">
    <div class="rs-cell">
      <div class="rs-lbl">预测振幅</div>
      <div class="rs-val neutral" id="rsAmp">--</div>
    </div>
    <div class="rs-cell">
      <div class="rs-lbl">支撑位</div>
      <div class="rs-val dn" id="rsSupport">--</div>
    </div>
    <div class="rs-cell">
      <div class="rs-lbl">阻力位</div>
      <div class="rs-val up" id="rsResist">--</div>
    </div>
  </div>
</div>

<!-- 小时预测 -->
<div class="hour-section">
  <div class="sec-hdr">
    <div class="sec-hdr-lbl">小时预测（交易时段）</div>
    <div class="sec-hdr-line"></div>
  </div>
  <div class="hour-list" id="hourList"></div>
</div>

<!-- 指标 -->
<div class="metrics">
  <div class="met">
    <div class="met-lbl">日内涨跌</div>
    <div class="met-val" id="mChg">--</div>
    <div class="met-sub" id="mChgS">较昨收</div>
  </div>
  <div class="met">
    <div class="met-lbl">成交量</div>
    <div class="met-val" id="mVol">--</div>
    <div class="met-sub" id="mVolS">vs 均量</div>
  </div>
  <div class="met">
    <div class="met-lbl">日内区间</div>
    <div class="met-val neutral" id="mRange" style="font-size:13px">--</div>
    <div class="met-sub" id="mRangeS">高低差</div>
  </div>
  <div class="met">
    <div class="met-lbl">综合评分</div>
    <div class="met-val" id="mScore">--</div>
    <div class="met-sub">满分 ±12</div>
  </div>
</div>

<!-- 日志 -->
<div class="log">
  <div class="log-hdr">// 刷新记录</div>
  <div id="logList"></div>
</div>

<div class="footer">
  <button class="btn" onclick="fetchData()">立即刷新</button>
  <div class="cd-txt" id="cdTxt">刷新: 60s</div>
</div>
<div class="disc">⚠ 仅供参考，不构成投资建议</div>

<script>
const SYM='TSLA',AVG_VOL=71590000,AVG_RANGE=12.0;
const TECH={weeklyTrend:-1,ma50Above:false,analystScore:-1};
const POLY_KEY='QvfDPUdAN48lgrtZQzrZSVA3jfpcKvnM';
let mkt=null,cdSec=60,cdTimer,slots=[],slotTimers={};
const $=id=>document.getElementById(id);
const f2=n=>Number(n).toFixed(2);
const fM=n=>(n/1e6).toFixed(1)+'M';
const fHM=d=>d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false});
const pad=n=>String(n).padStart(2,'0');
const clamp=(v,a,b)=>Math.min(Math.max(v,a),b);
const now=()=>new Date();

function setS(s,t){$('led').className='led '+(s==='ok'?'ok':s==='spin'?'spin':'err');$('statusTxt').textContent=t}
function showErr(m){$('errBox').style.display='block';$('errBox').textContent=m;$('manualRow').style.display='flex'}

async function tryF(url){
  const r=await fetch(url,{signal:AbortSignal.timeout(7000)});
  if(!r.ok)throw new Error('HTTP '+r.status);
  return r.json();
}

// 判断当前是否美股交易时间 (EST 9:30-16:00, 即PDT 6:30-13:00)
function getMarketState(){
  const n=now();
  const est=new Date(n.toLocaleString('en-US',{timeZone:'America/New_York'}));
  const h=est.getHours(),m=est.getMinutes(),day=est.getDay();
  if(day===0||day===6)return'CLOSED';
  const mins=h*60+m;
  if(mins<570)return'PRE';      // 9:30 = 570
  if(mins<960)return'REGULAR';  // 16:00 = 960
  return'CLOSED';
}

async function fetchData(){
  setS('spin','获取数据');$('errBox').style.display='none';

  try{
    const today=new Date();
    const dateStr=today.toISOString().slice(0,10);
    const prevDate=new Date(today);
    prevDate.setDate(prevDate.getDate()-5);
    const prevStr=prevDate.toISOString().slice(0,10);

    // 免费版可用接口：日K线 + 分钟K线
    const [barsRes, prevRes] = await Promise.all([
      // 今日5分钟K线
      tryF(`https://api.polygon.io/v2/aggs/ticker/${SYM}/range/5/minute/${dateStr}/${dateStr}?adjusted=true&sort=asc&limit=100&apiKey=${POLY_KEY}`),
      // 近5日日K（获取昨收）
      tryF(`https://api.polygon.io/v2/aggs/ticker/${SYM}/range/1/day/${prevStr}/${dateStr}?adjusted=true&sort=desc&limit=5&apiKey=${POLY_KEY}`)
    ]);

    if(procPoly(barsRes, prevRes)){resetCD();return;}
  }catch(e){console.warn('Polygon error:',e.message);}

  setS('err','连接失败');
  showErr('⚠️ 请通过GitHub Pages网址访问，不要直接打开下载的文件。或手动输入当前TSLA价格：');
  resetCD();
}

function procPoly(barsRes, prevRes){
  try{
    const bars=barsRes?.results||[];
    if(!bars.length)return false;

    // 从K线提取今日数据
    const closes=bars.map(b=>b.c).filter(Boolean);
    const highs=bars.map(b=>b.h).filter(Boolean);
    const lows=bars.map(b=>b.l).filter(Boolean);
    const vols=bars.map(b=>b.v).filter(Boolean);
    const opens=bars.map(b=>b.o).filter(Boolean);

    const price=closes.at(-1)||0;
    if(!price)return false;

    const open=opens[0]||price;
    const high=Math.max(...highs);
    const low=Math.min(...lows);
    const volume=vols.reduce((a,b)=>a+b,0);

    // 昨收：从日K里找今天之前最近的一根
    const todayStr=new Date().toISOString().slice(0,10);
    let prevClose=0;
    if(prevRes?.results?.length){
      const prev=prevRes.results.find(r=>{
        const d=new Date(r.t).toISOString().slice(0,10);
        return d<todayStr;
      });
      if(prev)prevClose=prev.c;
    }
    if(!prevClose)prevClose=open;

    const change=price-prevClose;
    const changePct=prevClose?(change/prevClose*100):0;
    const state=getMarketState();

    // 动量计算
    const rc=closes.slice(-12);
    const momentum1h=rc.length>1?((rc.at(-1)-rc[0])/rc[0]*100):0;
    const rv=vols.slice(-6).reduce((a,b)=>a+b,0);
    const pv=vols.slice(-12,-6).reduce((a,b)=>a+b,0)||rv;
    const volMom=pv?((rv-pv)/pv*100):0;

    mkt={price,open,high,low,prevClose,volume,change,changePct,state,momentum1h,volMom};
    renderAll();
    setS('ok','Polygon.io');
    return true;
  }catch(e){console.error('procPoly:',e);return false;}
}

// 获取单一实时价格（用于小时槽结束）
async function getP(){
  try{
    const today=new Date().toISOString().slice(0,10);
    const d=await tryF(`https://api.polygon.io/v2/aggs/ticker/${SYM}/range/1/minute/${today}/${today}?adjusted=true&sort=desc&limit=1&apiKey=${POLY_KEY}`);
    return d?.results?.[0]?.c||null;
  }catch(e){return null;}
}

function renderAll(){rPrice();rDay();rRange();rHours();rMetrics();addLog(mkt.price,mkt.changePct,mkt.volume);}

function rPrice(){
  const{price,change,changePct,open,state}=mkt,up=change>=0;
  $('priceNum').textContent='$'+f2(price);
  $('priceNum').className='price-num '+(up?'up':'dn');
  $('priceChg').textContent=(up?'▲ +':'▼ ')+f2(Math.abs(change))+' ('+(up?'+':'')+f2(changePct)+'%)';
  $('priceChg').className='price-chg '+(up?'up':'dn');
  $('priceTs').textContent=fHM(now())+' 更新';
  const isOpen=state==='REGULAR',isPre=state==='PRE';
  $('mktBadge').textContent=isOpen?'交易中':isPre?'盘前':'已收盘';
  $('mktBadge').className='mkt-badge '+(isOpen?'open':isPre?'pre':'closed');
  $('openVal').textContent='$'+f2(open);
  if(!isOpen&&!isPre){
    const d=price-open;
    $('closeVal').textContent='$'+f2(price);
    $('closeVal').className='oc-val '+(d>=0?'up':'dn');
    $('closeSub').textContent=(d>=0?'▲ +':'▼ ')+f2(Math.abs(d))+' ('+f2(d/open*100)+'%)';
  }else{
    $('closeVal').textContent='等待收盘';
    $('closeVal').className='oc-val dim';
    $('closeSub').textContent='16:00 EST 更新';
  }
}

function calcSig(ctx){
  const{price,open,high,low,prevClose,volume,changePct,momentum1h,volMom,slotIdx}=ctx;
  let score=0;const bull=[],bear=[],neut=[];
  const gap=((open-prevClose)/prevClose*100);
  if(gap>1.5){score+=2;bull.push('高开'+gap.toFixed(1)+'%')}
  else if(gap>0.3){score+=1;bull.push('小幅高开')}
  else if(gap<-1.5){score-=2;bear.push('低开'+Math.abs(gap).toFixed(1)+'%')}
  else if(gap<-0.3){score-=1;bear.push('小幅低开')}
  else neut.push('平开');
  if(changePct>2){score+=3;bull.push('强势涨+'+changePct.toFixed(1)+'%')}
  else if(changePct>0.8){score+=2;bull.push('日内偏多')}
  else if(changePct>0){score+=1;bull.push('微涨')}
  else if(changePct<-2){score-=3;bear.push('大幅跌'+changePct.toFixed(1)+'%')}
  else if(changePct<-0.8){score-=2;bear.push('日内偏空')}
  else{score-=1;bear.push('微跌')}
  if(momentum1h>0.5){score+=1;bull.push('1H动量正向')}
  else if(momentum1h<-0.5){score-=1;bear.push('1H动量负向')}
  const vr=volume/AVG_VOL;
  if(vr>1.4&&changePct>0){score+=2;bull.push('放量上涨')}
  if(vr>1.4&&changePct<0){score-=2;bear.push('放量下跌')}
  if(vr>1.1&&changePct>0){score+=1;bull.push('量价配合')}
  if(vr<0.7)neut.push('成交量萎缩');
  const rng=high-low,pos=rng>0.01?(price-low)/rng:0.5;
  if(pos>0.75){score+=1;bull.push('运行高位')}
  else if(pos<0.25){score-=1;bear.push('运行低位')}
  else neut.push('区间中段');
  if(TECH.weeklyTrend===-1){score-=1;bear.push('周线偏空')}
  if(!TECH.ma50Above){score-=1;bear.push('低于MA50')}
  if(TECH.analystScore<0){score-=1;bear.push('技术面强卖')}
  if(slotIdx!==undefined){
    if(slotIdx===0){score+=(changePct>0?1:-1);neut.push('开盘延续')}
    if(slotIdx===2||slotIdx===3){score=Math.round(score*0.7);neut.push('午盘低流动')}
    if(slotIdx>=5){score+=(changePct>0?1:-1);neut.push('尾盘方向')}
    if(volMom>20&&changePct>0){score+=1;bull.push('近期量增')}
    if(volMom>20&&changePct<0){score-=1;bear.push('近期量增跌')}
  }
  const up=Math.round(clamp(50+score*2.8,36,68));
  return{up,down:100-up,score,bull,bear,neut};
}

function rDay(){
  const sig=calcSig({...mkt}),isUp=sig.up>=sig.down,prob=isUp?sig.up:sig.down;
  $('dayPred').className='day-pred '+(isUp?'bullish':'bearish');
  $('dayDir').textContent=isUp?'▲ 看涨':'▼ 看跌';
  $('dayDir').className='pred-dir '+(isUp?'up':'dn');
  $('dayConf').textContent=prob+'%';
  $('dayConf').className='conf-num '+(isUp?'up':'dn');
  $('upBar').style.width=sig.up+'%';$('dnBar').style.width=sig.down+'%';
  $('upPct').textContent=sig.up+'%';$('dnPct').textContent=sig.down+'%';
  $('mScore').textContent=(sig.score>0?'+':'')+sig.score;
  $('mScore').className='met-val '+(sig.score>0?'up':sig.score<0?'dn':'neutral');
  const tags=$('sigTags');tags.innerHTML='';
  sig.bull.forEach(t=>tags.insertAdjacentHTML('beforeend',`<span class="sig-tag bull">▲ ${t}</span>`));
  sig.bear.forEach(t=>tags.insertAdjacentHTML('beforeend',`<span class="sig-tag bear">▼ ${t}</span>`));
  sig.neut.forEach(t=>tags.insertAdjacentHTML('beforeend',`<span class="sig-tag neutral">· ${t}</span>`));
}

function rRange(){
  const{price,high,low,changePct}=mkt;
  const curRange=high-low,atr=Math.max(AVG_RANGE,curRange*1.15);
  const bias=changePct>=0?0.55:0.45;
  const predLow=Math.min(low,price-atr*(1-bias));
  const predHigh=Math.max(high,price+atr*bias);
  const span=predHigh-predLow,r05=v=>Math.round(v*2)/2;
  const support=r05(predLow+span*0.2),resist=r05(predLow+span*0.8);
  $('rangeLow').textContent='$'+f2(predLow);
  $('rangeHigh').textContent='$'+f2(predHigh);
  $('rangeLowPct').textContent=f2((predLow-price)/price*100)+'%';
  $('rangeHighPct').textContent='+'+f2((predHigh-price)/price*100)+'%';
  $('rangeCur').textContent='$'+f2(price);
  $('rangeLowLbl').textContent='$'+f2(predLow);
  $('rangeHighLbl').textContent='$'+f2(predHigh);
  $('rangeDot').style.left=clamp(span>0?((price-predLow)/span*100):50,5,95)+'%';
  $('rsAmp').textContent='$'+f2(predHigh-predLow);
  $('rsSupport').textContent='$'+f2(support);
  $('rsResist').textContent='$'+f2(resist);
}

function buildSlots(){
  const t=now();
  return[[9,30,10,30],[10,30,11,30],[11,30,12,30],[12,30,13,30],[13,30,14,30],[14,30,16,0]]
    .map(([sh,sm,eh,em],idx)=>{
      const st=new Date(t);st.setHours(sh-3,sm,0,0);
      const et=new Date(t);et.setHours(eh-3,em,0,0);
      return{label:`${pad(sh)}:${pad(sm)}-${pad(eh)}:${pad(em)} EST`,st,et,idx,pred:null,cls:null,conf:null,sp:null,result:null};
    });
}

function rHours(){
  const n=now();
  if(!slots.length)slots=buildSlots();
  slots.forEach((s,i)=>{
    const active=n>=s.st&&n<s.et;
    if(active&&!s.pred&&mkt){
      const sig=calcSig({...mkt,slotIdx:i});
      s.pred=sig.up>=sig.down?'▲ 看涨':'▼ 看跌';
      s.cls=sig.up>=sig.down?'up':'dn';
      s.conf=sig.up>=sig.down?sig.up:sig.down;
      s.sp=mkt.price;schedEnd(s,i);
    }
  });
  const list=$('hourList');list.innerHTML='';
  slots.forEach(s=>{
    const n2=now(),active=n2>=s.st&&n2<s.et,past=n2>=s.et,future=n2<s.st;
    let sc='hslot';
    if(active)sc+=' active';
    if(past&&s.result!==null)sc+=s.result>=0?' hit-up':' hit-dn';
    let ph,ch,rh;
    if(future){
      ph=`<span class="hs-pred wait">待预测</span>`;
      ch=`<span class="hs-conf">--</span>`;
      rh=`<span class="hs-result wait">--</span>`;
    }else if(active){
      ph=s.pred?`<span class="hs-pred ${s.cls}">${s.pred}</span>`:`<span class="hs-pred wait">分析中</span>`;
      ch=s.conf?`<span class="hs-conf">${s.conf}%</span>`:`<span class="hs-conf">--</span>`;
      const rem=Math.max(0,Math.round((s.et-n2)/1000));
      rh=`<span class="hs-result live">剩${Math.floor(rem/60)}:${pad(rem%60)}</span>`;
    }else{
      ph=s.pred?`<span class="hs-pred ${s.cls}">${s.pred}</span>`:`<span class="hs-pred wait">--</span>`;
      ch=s.conf?`<span class="hs-conf">${s.conf}%</span>`:`<span class="hs-conf">--</span>`;
      rh=s.result!==null
        ?`<span class="hs-result ${s.result>=0?'up':'dn'}">${s.result>=0?'+':''}${(s.result/(s.sp||1)*100).toFixed(2)}%</span>`
        :`<span class="hs-result wait">--</span>`;
    }
    list.insertAdjacentHTML('beforeend',
      `<div class="${sc}"><span class="hs-time${active?' active':''}">${s.label}</span>${ph}${ch}${rh}</div>`);
  });
}

function schedEnd(s,i){
  clearTimeout(slotTimers[i]);
  const ms=s.et-now();if(ms<=0)return;
  slotTimers[i]=setTimeout(async()=>{
    const ep=await getP();if(ep&&s.sp){s.result=ep-s.sp;}rHours();
  },ms);
}
setInterval(()=>{if(mkt)rHours();},30000);

function rMetrics(){
  const{changePct,volume,high,low}=mkt,vr=volume/AVG_VOL;
  $('mChg').textContent=(changePct>=0?'+':'')+f2(changePct)+'%';
  $('mChg').className='met-val '+(changePct>=0?'up':'dn');
  $('mChgS').textContent='较昨收 '+(changePct>=0?'▲':'▼');
  $('mVol').textContent=fM(volume);
  $('mVol').className='met-val '+(vr>1.1?'up':vr<0.9?'dn':'neutral');
  $('mVolS').textContent=(vr*100).toFixed(0)+'% 均量';
  $('mRange').textContent='$'+f2(low)+' ~ $'+f2(high);
  $('mRangeS').textContent='振幅 $'+f2(high-low);
}

function submitManual(){
  const val=parseFloat($('manualInput').value);
  if(!val||val<10){alert('请输入有效价格');return;}
  mkt={
    price:val,open:373.72,high:Math.max(val,382.76),low:Math.min(val,370.73),
    prevClose:373.72,volume:62890000,change:val-373.72,
    changePct:((val-373.72)/373.72*100),state:'CLOSED',
    momentum1h:val>376?0.3:-0.3,volMom:-5
  };
  renderAll();setS('ok','手动模式');$('errBox').style.display='none';
}

function addLog(price,chgPct,vol){
  const row=document.createElement('div');row.className='log-row';
  const c=chgPct>=0?'up':'dn';
  row.innerHTML=`<span class="lr-t">${fHM(now())}</span><span class="lr-p">$${f2(price)}</span><span class="lr-c ${c}">${chgPct>=0?'+':''}${f2(chgPct)}%</span><span class="lr-v">${fM(vol||0)}</span>`;
  const list=$('logList');
  list.insertBefore(row,list.firstChild);
  if(list.children.length>20)list.removeChild(list.lastChild);
}

function resetCD(){
  clearInterval(cdTimer);cdSec=60;
  cdTimer=setInterval(()=>{
    cdSec--;$('cdTxt').textContent='刷新: '+cdSec+'s';
    if(cdSec<=0)fetchData();
  },1000);
}

fetchData();
</script>
